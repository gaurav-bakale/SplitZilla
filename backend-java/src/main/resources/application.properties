# Application Configuration
spring.application.name=SplitZilla
server.port=8000

# H2 Database Configuration (Development)
spring.datasource.url=jdbc:h2:mem:splitzilla
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-in-production-make-it-at-least-256-bits
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Jackson Configuration
spring.jackson.property-naming-strategy=SNAKE_CASE

# Logging
logging.level.com.splitzilla=DEBUG
logging.level.org.springframework.security=DEBUG
